version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: dailytax_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: dailytax
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dailytax_net

  app:
    build: .
    container_name: dailytax_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    env_file:
      - .env
    command: /usr/local/bin/entrypoint.sh
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dailytax_net

  queue:
    build: .
    container_name: dailytax_queue
    restart: unless-stopped
    volumes:
      - .:/var/www
    env_file:
      - .env
    command: php artisan queue:work
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dailytax_net

  scheduler:
    build: .
    container_name: dailytax_scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www
    env_file:
      - .env
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dailytax_net

volumes:
  db_data:

networks:
  dailytax_net:
    driver: bridge
