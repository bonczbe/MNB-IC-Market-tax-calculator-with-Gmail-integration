services:
  db:
    image: mariadb:latest
    container_name: dailytax_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dailytax_net

  app:
    build: .
    container_name: dailytax_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
      - storage_data:/var/www/storage/framework
    env_file:
      - .env
    command: /usr/local/bin/entrypoint.sh
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - dailytax_net

  queue:
    build: .
    container_name: dailytax_queue
    restart: unless-stopped
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
      - storage_data:/var/www/storage/framework
    env_file:
      - .env
    command: php artisan queue:work
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dailytax_net

  scheduler:
    build: .
    container_name: dailytax_scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - node_modules_data:/var/www/node_modules
      - storage_data:/var/www/storage/framework
    env_file:
      - .env
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dailytax_net

volumes:
  db_data:
  vendor_data:
  node_modules_data:
  storage_data:

networks:
  dailytax_net:
    driver: bridge
